services:
  postgres:
    image: postgres:16-alpine
    container_name: outreachai_db
    environment:
      POSTGRES_USER: outreachai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: outreachai
    ports:
      - "5432:5432"
    volumes:
      - outreachai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outreachai -d outreachai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  outreachai_pgdata:
    driver: local
